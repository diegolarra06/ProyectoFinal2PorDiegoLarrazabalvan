<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes</title>
    <link rel="stylesheet" th:href="@{/css/adopta.css}">
</head>
<body>
<header class="topbar">
    <div class="container nav">
        <a class="brand" th:href="@{/}">Adopta<span>UnCompañero</span></a>
        <nav>
            <a th:href="@{/animales}">Animales</a>
            <a th:href="@{/usuarios}">Usuarios</a>
            <a th:href="@{/admin}">Admin</a>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container cards-2">
        <div class="panel">
            <span class="pill">Nueva solicitud</span>
            <h2>Crear solicitud de adopción</h2>
            <form th:action="@{/solicitudes/insertar}" th:object="${solicitud}" method="post" class="form-grid">
                <input type="number" th:field="*{idUsuario}" placeholder="ID usuario" required>
                <input type="number" th:field="*{idAnimal}" placeholder="ID animal" required>
                <input type="text" th:field="*{comentarios}" placeholder="Comentarios">
                <button class="btn btn-primary" type="submit">Crear solicitud</button>
            </form>
        </div>

        <div class="panel">
            <span class="pill">Cambio de estado</span>
            <h2>Actualizar solicitud</h2>
            <form th:action="@{/solicitudes/estado}" th:object="${cambioEstado}" method="post" class="form-grid">
                <input type="number" th:field="*{idSolicitud}" placeholder="ID solicitud" required>
                <select th:field="*{nuevoEstado}">
                    <option value="EN_REVISION">EN_REVISION</option>
                    <option value="APROBADA">APROBADA</option>
                    <option value="RECHAZADA">RECHAZADA</option>
                    <option value="EN_PROCESO">EN_PROCESO</option>
                    <option value="FINALIZADA">FINALIZADA</option>
                </select>
                <input type="text" th:field="*{comentarioAdmin}" placeholder="Comentario admin">
                <button class="btn btn-secondary" type="submit">Cambiar estado</button>
            </form>
        </div>
    </div>

    <div class="container mt-32">
        <div class="panel">
            <h1>Listado de solicitudes</h1>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ID Usuario</th>
                        <th>Usuario</th>
                        <th>ID Animal</th>
                        <th>Animal</th>
                        <th>Estado</th>
                        <th>Comentarios</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="solicitud : ${solicitudes}">
                        <td th:text="${solicitud.idSolicitud}"></td>
                        <td th:text="${solicitud.idUsuario}"></td>
                        <td th:text="${solicitud.nombreUsuario}"></td>
                        <td th:text="${solicitud.idAnimal}"></td>
                        <td th:text="${solicitud.nombreAnimal}"></td>
                        <td><span class="badge" th:text="${solicitud.estado}"></span></td>
                        <td th:text="${solicitud.comentarios}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
