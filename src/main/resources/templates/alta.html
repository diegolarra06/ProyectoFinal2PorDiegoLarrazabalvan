<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopción De Animales</title>
    <link rel="stylesheet" th:href="@{/css/primaria.css}">
    <link rel="stylesheet" th:href="@{/css/paginaAlta.css}">
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>Adopción De Animales</h1>
            <p>¡Haz una diferencia en la vida de un animal hoy mismo!</p>
        </div>
    </div>

    <header>
        <h1 id="titulo">Adopción De Animales</h1>
    </header>

    <main>
        <div id="formulario">
            <form>
                <input type="text" name="nombre" id="nombre" class="input" required placeholder="Nombre">
                <input type="text" name="apellidos" id="apellidos" class="input" required placeholder="Apellidos">
                <br>
                <input type="text" name="dni" id="DNI" class="input" required placeholder="DNI" pattern="\\d{8}[A-Z]">
                <br>
                <input type="text" name="direccion" id="direccion" class="input" required placeholder="Dirección">
                <br>
                <input type="text" name="ciudad" id="ciudad" class="input" required placeholder="Ciudad">
                <input type="text" list="cod_postales" name="codpostal" id="codpostal" class="input" required placeholder="Cod.Postal" pattern="\\d{5}">
                <input type="text" name="pais" id="pais" class="input" required placeholder="País">
                <br>

                <datalist id="cod_postales">
                    <option value="23455"></option>
                    <option value="54645"></option>
                    <option value="89756"></option>
                    <option value="12345"></option>
                    <option value="54367"></option>
                </datalist>

                <input type="date" name="fechaNacimiento" id="fechaNacimiento" class="input">
                <br>
                <input type="email" name="email" id="email" class="input" placeholder="Correo Electrónico">
                <br>
                <input type="password" name="contrasena" id="contrasena" class="input" required placeholder="Contraseña">
                <br>

                <h2>Elija El Sexo:</h2>
                <div class="radio-input">
                    <input value="Macho" name="sexo" id="Macho" type="radio">
                    <label for="Macho">Macho</label>

                    <input value="Hembra" name="sexo" id="Hembra" type="radio">
                    <label for="Hembra">Hembra</label>
                </div>

                <h2>Tengo Más Afición Con:</h2>
                <div class="animales-opciones">
                    <label><input name="animal" type="checkbox"> 🐶</label>
                    <label><input name="animal" type="checkbox"> 🦎</label>
                    <label><input name="animal" type="checkbox"> 🐰</label>
                    <label><input name="animal" type="checkbox"> 🐟</label>
                    <label><input name="animal" type="checkbox"> 🦜</label>
                    <label><input name="animal" type="checkbox"> 🦀</label>
                </div>

                <br><br>
                <input type="text" name="otro" id="otro" class="input" placeholder="Otro">
                <br><br>

                <label for="fotoperfil" class="fotodeperfil">Añadir Foto De Perfil</label>
                <input id="fotoperfil" type="file" accept="image/png, image/jpeg">
                <br><br>

                <button class="button" type="submit">Enviar</button>
                <button class="button" type="reset">Borrar</button>
                <a class="button" th:href="@{/}">Cancelar</a>
            </form>
        </div>
    </main>

    <div class="contacto">
        📞 Teléfono: <a href="tel:+123456789">+34 234 567 89</a> | ✉️ Correo: <a href="mailto:ivansanchez@gmail.com">ivansanchez@gmail.com</a>
    </div>
</body>
</html>
